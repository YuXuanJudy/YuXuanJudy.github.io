<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — 個人頁面</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="p-8 font-sans">
  <header class="mb-6">
    <a href="index.html" class="text-blue-600 hover:underline">← 回首頁</a>
  </header>
  <main class="max-w-3xl">
    <h1 class="text-3xl font-bold mb-4">Contact</h1>
    <p class="mb-4">若要聯絡我，請填寫下面表單或直接使用電子郵件。</p>
    <form action="action_page.php" method="post" class="space-y-4">
      <div>
        <label class="block font-medium">姓名</label>
        <input name="name" class="border p-2 rounded w-full" required>
      </div>
      <div>
        <label class="block font-medium">電子郵件</label>
        <input type="email" name="email" class="border p-2 rounded w-full" required>
      </div>
      <div>
        <label class="block font-medium">留言</label>
        <textarea name="message" class="border p-2 rounded w-full" rows="6" required></textarea>
      </div>
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">送出</button>
    </form>
  </main>
  <footer class="mt-12 text-sm text-gray-500">© 2026 你的名字</footer>
</body>
</html>
